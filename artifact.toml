kind = "web"
previewPath = "/"
title = "Smart Health Checker"
version = "1.0.0"
id = "artifacts/smart-health-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25184

[services.development]
run = "pnpm --filter @workspace/smart-health-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-health-checker", "run", "build" ]
publicDir = "artifacts/smart-health-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25184"
BASE_PATH = "/"
